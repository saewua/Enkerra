<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e8789a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Enkerra ang' Baby Shop</title>
    <link rel="manifest" href="/manifest.json">

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --primary: #e8789a; --primary-dark: #c45d7e; --bg: #fdf6f9; --surface: #fff;
            --text: #3d2c33; --text-secondary: #6b5b63; --border: #f0d8e0;
            --success: #4caf84; --warning: #f0a04b; --danger: #e0556a;
            --radius: 14px; --radius-sm: 8px; --nav-height: 64px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: var(--nav-height); }
        .app-header { position: sticky; top:0; z-index:100; background: var(--surface); border-bottom:1px solid var(--border); padding:0 16px; height:56px; display:flex; align-items:center; justify-content:space-between; }
        .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:1.15rem; color:var(--primary-dark); }
        .cart-badge-btn { position:relative; background:none; border:none; font-size:1.5rem; cursor:pointer; }
        .cart-badge-btn .badge { position:absolute; top:-2px; right:-4px; background:var(--danger); color:white; width:20px; height:20px; border-radius:50%; font-size:0.7rem; display:flex; align-items:center; justify-content:center; }
        .main-content { padding:16px; max-width:900px; margin:0 auto; }
        .screen { display:none; }
        .screen.active { display:block; }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; height:var(--nav-height); z-index:100; overflow-x:auto; }
        .bottom-nav button { flex:1; min-width:50px; border:none; background:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:0.65rem; color:var(--text-secondary); white-space:nowrap; }
        .bottom-nav button.active { color:var(--primary); font-weight:600; }
        .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 18px; border-radius:var(--radius-sm); font-weight:600; border:none; cursor:pointer; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-outline { background:var(--surface); color:var(--primary); border:2px solid var(--primary); }
        .btn-sm { padding:6px 12px; font-size:0.78rem; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-weight:600; font-size:0.8rem; margin-bottom:4px; }
        .form-group input, .form-group select { width:100%; padding:10px; border:2px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); outline:none; }
        .product-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap:10px; }
        .product-card { background:var(--surface); border-radius:var(--radius-sm); padding:10px; cursor:pointer; border:2px solid var(--border); }
        .cart-panel { background:var(--surface); border-radius:var(--radius); padding:14px; margin-top:12px; }
        .toast-container { position:fixed; top:16px; right:16px; z-index:9999; }
        .toast { background:#333; color:white; padding:12px 18px; border-radius:8px; margin-bottom:8px; animation: slideIn 0.3s; }
        @keyframes slideIn { from{transform:translateX(120%);} to{transform:translateX(0);} }
        .filter-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:16px; background:var(--surface); padding:12px; border-radius:var(--radius-sm); border:1px solid var(--border); }
        .filter-bar select { padding:8px; border-radius:6px; border:1px solid var(--border); }
        .table { width:100%; border-collapse:collapse; font-size:0.8rem; }
        .table th, .table td { padding:8px; text-align:left; border-bottom:1px solid var(--border); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center; }
        .modal-overlay.active { display:flex; }
        .modal { background:white; padding:20px; border-radius:14px; width:90%; max-width:500px; max-height:80vh; overflow-y:auto; }
        .receipt-content { font-family: 'Courier New', monospace; font-size:0.85rem; line-height:1.4; }
        .receipt-content hr { margin:8px 0; border-top:1px dashed #ccc; }
        .stat-card.net { border-left: 4px solid var(--success); }
    </style>
</head>
<body>

    <!-- Main App -->
    <div id="appMain">
        <header class="app-header">
            <div class="logo"><span>👶</span><span>Enkerra Baby Shop</span></div>
            <button class="cart-badge-btn" id="cartBtn">🛒<span class="badge" id="cartBadge"></span></button>
        </header>

        <div class="main-content">
            <!-- POS Screen -->
            <div class="screen active" id="screen-pos">
                <h2>🛍️ New Sale</h2>
                <div style="display:flex; gap:8px; margin-bottom:12px;">
                    <input type="text" id="posSearch" placeholder="Search..." style="flex:1;">
                    <select id="posCategoryFilter"><option value="">All</option></select>
                </div>
                <div class="product-grid" id="posProductGrid"></div>
                <div class="cart-panel">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>Cart</strong><button class="btn btn-sm" onclick="clearCart()">Clear</button>
                    </div>
                    <div id="cartItemsList"></div>
                    <div style="display:flex; justify-content:space-between; margin:12px 0; font-weight:700;">
                        <span>Total:</span><span id="cartTotal">KSh 0.00</span>
                    </div>
                    <button class="btn btn-primary" style="width:100%;" id="checkoutBtn" disabled>💳 Checkout</button>
                </div>
            </div>

            <!-- Products Screen -->
            <div class="screen" id="screen-products">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                    <h2>📦 Products</h2>
                    <div>
                        <button class="btn btn-primary btn-sm" onclick="openProductForm()">+ Add</button>
                        <button class="btn btn-outline btn-sm" onclick="exportProductsCSV()">⬇️ CSV</button>
                    </div>
                </div>
                <div style="display:flex; gap:8px; margin:12px 0;">
                    <input type="text" id="productSearch" placeholder="Search..." style="flex:1;">
                    <select id="categoryFilter"><option value="">All</option></select>
                </div>
                <div class="product-grid" id="productListGrid"></div>
            </div>

            <!-- Stock Screen -->
            <div class="screen" id="screen-stock">
                <h2>📋 Stock</h2>
                <div style="display:flex; gap:8px; margin-bottom:12px;">
                    <input type="text" id="stockSearch" placeholder="Search..." style="flex:1;">
                    <button class="btn btn-outline btn-sm" onclick="exportStockCSV()">⬇️ CSV</button>
                </div>
                <div id="stockList"></div>
            </div>

            <!-- Expenses Screen -->
            <div class="screen" id="screen-expenses">
                <h2>💰 Expenses</h2>
                <div style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
                    <button class="btn btn-primary btn-sm" onclick="openExpenseForm()">+ Add Expense</button>
                    <button class="btn btn-outline btn-sm" onclick="exportExpensesCSV()">⬇️ CSV</button>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap;">
                    <select id="expenseFilterCategory"><option value="">All Categories</option><option>Rent</option><option>Transport</option><option>Stock</option><option>Others</option></select>
                    <input type="date" id="expenseFilterDate">
                    <button class="btn btn-sm" onclick="refreshExpenseList()">Filter</button>
                </div>
                <div id="expenseList"></div>
            </div>

            <!-- Dashboard Screen -->
            <div class="screen" id="screen-dashboard">
                <h2>📊 Dashboard</h2>
                <div class="filter-bar">
                    <div><label>Year</label><select id="filterYear"></select></div>
                    <div><label>Month</label><select id="filterMonth">
                        <option value="">All</option><option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option><option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option><option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                    </select></div>
                    <div><label>Week</label><select id="filterWeek"><option value="">All</option><option value="1">W1</option><option value="2">W2</option><option value="3">W3</option><option value="4">W4</option><option value="5">W5</option></select></div>
                    <button class="btn btn-outline btn-sm" onclick="applyDashboardFilter()">Apply</button>
                    <button class="btn btn-sm" onclick="exportSalesCSV()" style="margin-left:auto;">📥 Export CSV</button>
                </div>
                <!-- Updated stat cards: 4 columns, 6 cards total -->
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; margin-bottom:16px;">
                    <div class="stat-card"><div class="stat-value" id="statTodaySales">0</div><div>Sales Count</div></div>
                    <div class="stat-card"><div class="stat-value" id="statRevenue">KSh 0</div><div>Revenue</div></div>
                    <div class="stat-card net"><div class="stat-value" id="statNetProfit">KSh 0</div><div>Net Profit</div></div>
                    <div class="stat-card"><div class="stat-value" id="statAvgDaily">KSh 0</div><div>Avg Daily</div></div>
                    <div class="stat-card"><div class="stat-value" id="statProducts">0</div><div>Products</div></div>
                    <div class="stat-card warning"><div class="stat-value" id="statLowStock">0</div><div>Low Stock</div></div>
                </div>
                <canvas id="salesChart" style="width:100%; height:250px;"></canvas>
                <div style="margin-top: 16px;">
                    <h3 style="font-size:0.9rem; margin-bottom:8px;">📅 Monthly Revenue vs Expenses</h3>
                    <canvas id="monthlyChart" style="width:100%; height:250px;"></canvas>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <button data-screen="pos" class="active"><span>🛍️</span>Sale</button>
            <button data-screen="products"><span>📦</span>Products</button>
            <button data-screen="stock"><span>📋</span>Stock</button>
            <button data-screen="expenses"><span>💰</span>Expenses</button>
            <button data-screen="dashboard"><span>📊</span>Dashboard</button>
        </nav>
    </div>

    <!-- Modals (product, expense, checkout, receipt) – same as before -->
    <div id="productModal" class="modal-overlay">
        <div class="modal">
            <h2>Product</h2>
            <form id="productForm">
                <input type="hidden" id="editId">
                <div class="form-group"><label>Product Name*</label><input id="prodName" required></div>
                <div class="form-group"><label>Product Code (SKU)</label><input id="prodCode"></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;"><label>Category</label><select id="prodCategory"><option>Onesies</option><option>Dresses</option><option>Sets</option><option>Tops</option><option>Bottoms</option><option>Sleepwear</option></select></div>
                    <div class="form-group" style="flex:1;"><label>Condition</label><select id="prodCondition"><option>New</option><option>Second-Hand</option></select></div>
                </div>
                <div class="form-group"><label>Size</label><select id="prodSize"><option>Newborn</option><option>0-3M</option><option>3-6M</option><option>6-12M</option><option>12-18M</option></select></div>
                <div class="form-group"><label>Supplier</label><input id="prodSupplier" placeholder="Supplier name"></div>
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;"><label>Buying Price (Cost)</label><input type="number" id="prodCost" step="0.01"></div>
                    <div class="form-group" style="flex:1;"><label>Selling Price*</label><input type="number" id="prodPrice" required step="0.01"></div>
                </div>
                <div class="form-group"><label>Stock Quantity*</label><input type="number" id="prodQty" required></div>
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" onclick="closeModal('productModal')">Cancel</button>
            </form>
        </div>
    </div>

    <div id="expenseModal" class="modal-overlay">
        <div class="modal">
            <h2>Add Expense</h2>
            <form id="expenseForm">
                <input type="hidden" id="expEditId">
                <div class="form-group"><label>Category</label><select id="expCategory"><option>Rent</option><option>Transport</option><option>Stock</option><option>Others</option></select></div>
                <div class="form-group"><label>Amount (KSh)*</label><input type="number" id="expAmount" required step="0.01"></div>
                <div class="form-group"><label>Description</label><input id="expDesc" placeholder="e.g., August rent"></div>
                <div class="form-group"><label>Date</label><input type="date" id="expDate" required></div>
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" onclick="closeModal('expenseModal')">Cancel</button>
            </form>
        </div>
    </div>

    <div id="checkoutModal" class="modal-overlay">
        <div class="modal">
            <h2>Complete Sale</h2>
            <div class="form-group"><label>Customer Email</label><input id="checkoutEmail" placeholder="email@example.com"></div>
            <div class="form-group"><label>Payment</label><select id="checkoutPayment"><option>Cash</option><option>M-Pesa</option><option>Card</option></select></div>
            <p>Total: <strong id="checkoutTotal"></strong></p>
            <button class="btn btn-success" onclick="completeSale()">✅ Complete</button>
            <button onclick="closeModal('checkoutModal')">Cancel</button>
        </div>
    </div>

    <div id="receiptModal" class="modal-overlay">
        <div class="modal">
            <h2>🧾 Receipt</h2>
            <div id="receiptSerial" style="font-weight:700; margin-bottom:8px;"></div>
            <div class="receipt-content" id="receiptBody"></div>
            <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
                <button class="btn btn-outline btn-sm" onclick="printReceipt()">🖨️ Print</button>
                <button class="btn btn-primary btn-sm" onclick="downloadPDF()">📄 Download PDF</button>
                <button class="btn btn-sm" onclick="closeModal('receiptModal')">Close</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============== INDEXEDDB ==============
        const DB_NAME = 'EnkerraLocalDB';
        let db;
        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 2);
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains('products')) database.createObjectStore('products', { keyPath: 'id', autoIncrement: true });
                    if (!database.objectStoreNames.contains('sales')) database.createObjectStore('sales', { keyPath: 'id', autoIncrement: true });
                    if (!database.objectStoreNames.contains('expenses')) database.createObjectStore('expenses', { keyPath: 'id', autoIncrement: true });
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };
                request.onerror = (e) => reject(e.target.error);
            });
        }
        const idb = {
            add: (store, data) => new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                const req = tx.objectStore(store).add(data);
                req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);
            }),
            put: (store, data) => new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                const req = tx.objectStore(store).put(data);
                req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);
            }),
            getAll: (store) => new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).getAll();
                req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);
            }),
            get: (store, id) => new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).get(id);
                req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);
            }),
            delete: (store, id) => new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                const req = tx.objectStore(store).delete(id);
                req.onsuccess = () => resolve(); req.onerror = () => reject(req.error);
            })
        };

        const EMAILJS_USER_ID = "YOUR_EMAILJS_USER_ID";
        const EMAILJS_SERVICE_ID = "YOUR_SERVICE_ID";
        const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
        try { emailjs.init(EMAILJS_USER_ID); } catch(e) {}

        let cart = [];
        let allProducts = [];
        let allSalesCache = [];
        let allExpensesCache = [];
        let chartInstance = null;
        let monthlyChartInstance = null;
        let currentFilter = { year: new Date().getFullYear(), month: '', week: '' };
        let lastReceiptData = null;

        async function initApp() {
            await openDB();
            await loadAllData();
            attachNavEvents();
            navigateTo('pos');
            refreshAll();
        }
        async function loadAllData() {
            allProducts = await idb.getAll('products');
            allSalesCache = await idb.getAll('sales');
            allExpensesCache = await idb.getAll('expenses');
            updateCategoryDropdowns();
        }
        function updateCategoryDropdowns() {
            const cats = [...new Set(allProducts.map(p => p.category))].sort();
            const html = '<option value="">All</option>' + cats.map(c => `<option>${c}</option>`).join('');
            document.getElementById('categoryFilter').innerHTML = html;
            document.getElementById('posCategoryFilter').innerHTML = html;
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // Navigation
        const screens = {
            pos: document.getElementById('screen-pos'),
            products: document.getElementById('screen-products'),
            stock: document.getElementById('screen-stock'),
            expenses: document.getElementById('screen-expenses'),
            dashboard: document.getElementById('screen-dashboard')
        };
        function navigateTo(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            if (screens[name]) screens[name].classList.add('active');
            document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-screen="${name}"]`)?.classList.add('active');
            if (name === 'pos') refreshPOS();
            if (name === 'products') refreshProductList();
            if (name === 'stock') refreshStock();
            if (name === 'expenses') refreshExpenseList();
            if (name === 'dashboard') refreshDashboard();
        }
        function attachNavEvents() {
            document.querySelectorAll('.bottom-nav button').forEach(btn => btn.addEventListener('click', () => navigateTo(btn.dataset.screen)));
            document.getElementById('cartBtn').addEventListener('click', () => navigateTo('pos'));
        }

        // Products CRUD
        function openProductForm(id = null) {
            document.getElementById('editId').value = id || '';
            document.getElementById('productForm').reset();
            if (id) {
                const p = allProducts.find(x => x.id === id);
                document.getElementById('prodName').value = p.name;
                document.getElementById('prodCode').value = p.productCode || '';
                document.getElementById('prodCategory').value = p.category;
                document.getElementById('prodCondition').value = p.condition;
                document.getElementById('prodSize').value = p.size;
                document.getElementById('prodSupplier').value = p.supplier || '';
                document.getElementById('prodCost').value = p.costPrice || '';
                document.getElementById('prodPrice').value = p.price;
                document.getElementById('prodQty').value = p.quantity;
            }
            document.getElementById('productModal').classList.add('active');
        }
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('prodName').value.trim(),
                productCode: document.getElementById('prodCode').value.trim(),
                category: document.getElementById('prodCategory').value,
                condition: document.getElementById('prodCondition').value,
                size: document.getElementById('prodSize').value,
                supplier: document.getElementById('prodSupplier').value.trim(),
                costPrice: parseFloat(document.getElementById('prodCost').value) || 0,
                price: parseFloat(document.getElementById('prodPrice').value),
                quantity: parseInt(document.getElementById('prodQty').value)
            };
            const id = document.getElementById('editId').value;
            if (id) { data.id = parseInt(id); await idb.put('products', data); }
            else { await idb.add('products', data); }
            closeModal('productModal');
            await loadAllData(); refreshAll(); showToast('Product saved');
        });
        function refreshProductList() {
            const search = (document.getElementById('productSearch')?.value || '').toLowerCase();
            const cat = document.getElementById('categoryFilter')?.value || '';
            let filtered = allProducts.filter(p => (!search || p.name.toLowerCase().includes(search)) && (!cat || p.category === cat));
            document.getElementById('productListGrid').innerHTML = filtered.map(p => `
                <div class="product-card" onclick="openProductForm(${p.id})">
                    <strong>${p.name}</strong><br>
                    Buy: KSh ${p.costPrice||0} | Sell: KSh ${p.price}<br>
                    Stock: ${p.quantity}
                    ${p.supplier ? `<br><small>Supp: ${p.supplier}</small>` : ''}
                </div>`).join('');
        }

        // POS
        function refreshPOS() {
            const search = (document.getElementById('posSearch')?.value || '').toLowerCase();
            const cat = document.getElementById('posCategoryFilter')?.value || '';
            let filtered = allProducts.filter(p => (!search || p.name.toLowerCase().includes(search)) && (!cat || p.category === cat));
            document.getElementById('posProductGrid').innerHTML = filtered.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <strong>${p.name}</strong><br>KSh ${p.price}<br>Qty: ${p.quantity}
                </div>`).join('');
            updateCartUI();
        }
        function addToCart(pid) {
            const prod = allProducts.find(p => p.id === pid);
            if (!prod || prod.quantity <= 0) { showToast('Out of stock', 'error'); return; }
            const existing = cart.find(i => i.productId === pid);
            if (existing) {
                if (existing.quantity >= prod.quantity) { showToast('Max stock'); return; }
                existing.quantity++;
            } else {
                cart.push({ productId: pid, name: prod.name, price: prod.price, costPrice: prod.costPrice || 0, quantity: 1 });
            }
            updateCartUI();
        }
        function updateCartUI() {
            const total = cart.reduce((s,i) => s + i.price * i.quantity, 0);
            document.getElementById('cartTotal').textContent = `KSh ${total.toFixed(2)}`;
            document.getElementById('cartBadge').textContent = cart.reduce((s,i) => s + i.quantity, 0) || '';
            document.getElementById('checkoutBtn').disabled = cart.length === 0;
            document.getElementById('cartItemsList').innerHTML = cart.map((item,i) => `
                <div style="display:flex; justify-content:space-between;">
                    <span>${item.name} x${item.quantity}</span>
                    <span>KSh ${(item.price*item.quantity).toFixed(2)}
                        <button onclick="updateCartItem(${i},-1)">-</button>
                        <button onclick="updateCartItem(${i},1)">+</button>
                    </span>
                </div>`).join('');
        }
        window.updateCartItem = (i, d) => {
            const item = cart[i];
            const prod = allProducts.find(p => p.id === item.productId);
            const newQty = item.quantity + d;
            if (newQty <= 0) { cart.splice(i,1); }
            else if (prod && newQty > prod.quantity) { showToast('Insufficient stock'); return; }
            else { item.quantity = newQty; }
            updateCartUI();
        };
        window.clearCart = () => { cart = []; updateCartUI(); };

        // Receipt
        function viewReceipt(sale) {
            const date = new Date(sale.date);
            const serial = String(sale.id).padStart(6, '0');
            document.getElementById('receiptSerial').textContent = `Receipt #: ${serial}`;
            const receiptHTML = `
                <div style="text-align:center; margin-bottom:10px;">
                    <strong style="font-size:1.1rem;">Enkerra ang' Baby Shop</strong><br>
                    <small>Baby Cloth Store</small>
                </div><hr>
                <div>Date: ${date.toLocaleDateString()} ${date.toLocaleTimeString()}</div>
                <div>Payment: ${sale.paymentMethod || 'N/A'}</div>
                ${sale.customerEmail ? `<div>Email: ${sale.customerEmail}</div>` : ''}<hr>
                <table style="width:100%;">${sale.items.map(i => `<tr><td>${i.name}</td><td>x${i.quantity}</td><td style="text-align:right;">KSh ${(i.price*i.quantity).toFixed(2)}</td></tr>`).join('')}</table><hr>
                <div style="text-align:right; font-weight:700;">TOTAL: KSh ${sale.total.toFixed(2)}</div>
                <div style="text-align:center; margin-top:12px; font-size:0.75rem; color:#888;">Thank you for shopping with us!</div>`;
            document.getElementById('receiptBody').innerHTML = receiptHTML;
            document.getElementById('receiptModal').classList.add('active');
        }
        function printReceipt() {
            const content = document.getElementById('receiptBody').innerHTML;
            const serial = document.getElementById('receiptSerial').textContent;
            const printWindow = window.open('', '_blank', 'width=400,height=600');
            printWindow.document.write(`<html><head><title>Receipt ${serial}</title><style>body{font-family:monospace; padding:20px;} hr{border-top:1px dashed #ccc;}</style></head><body><div style="font-weight:700; margin-bottom:8px;">${serial}</div>${content}</body></html>`);
            printWindow.document.close();
            printWindow.print();
        }
        function downloadPDF() {
            const content = document.getElementById('receiptBody').innerHTML;
            const serial = document.getElementById('receiptSerial').textContent;
            const pdfWindow = window.open('', '_blank');
            pdfWindow.document.write(`<html><head><title>Receipt ${serial}</title><style>body{font-family:monospace; padding:30px; max-width:400px; margin:0 auto; color:#333;} hr{border-top:1px dashed #aaa;}</style></head><body><div style="font-weight:700; margin-bottom:10px;">${serial}</div>${content}</body></html>`);
            pdfWindow.document.close();
            pdfWindow.focus();
            setTimeout(() => pdfWindow.print(), 500);
        }

        // Checkout
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            document.getElementById('checkoutTotal').textContent = document.getElementById('cartTotal').textContent;
            document.getElementById('checkoutModal').classList.add('active');
        });
        async function completeSale() {
            const sale = {
                items: cart.map(i => ({
                    name: i.name,
                    price: i.price,
                    costPrice: i.costPrice || 0,   // store cost price in the sale record
                    quantity: i.quantity
                })),
                total: cart.reduce((s,i) => s + i.price * i.quantity, 0),
                date: new Date().toISOString(),
                paymentMethod: document.getElementById('checkoutPayment').value,
                customerEmail: document.getElementById('checkoutEmail').value
            };
            for (let i of cart) {
                const prod = allProducts.find(p => p.id === i.productId);
                if (prod) { prod.quantity -= i.quantity; await idb.put('products', prod); }
            }
            const saleId = await idb.add('sales', sale);
            sale.id = saleId;
            cart = []; updateCartUI(); closeModal('checkoutModal');
            await loadAllData(); refreshAll(); showToast('Sale completed!');
            lastReceiptData = sale; viewReceipt(sale);
            if (sale.customerEmail && EMAILJS_USER_ID !== "YOUR_EMAILJS_USER_ID") {
                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        to_email: sale.customerEmail, receipt_id: sale.id,
                        date: new Date(sale.date).toLocaleDateString(), time: new Date(sale.date).toLocaleTimeString(),
                        payment_method: sale.paymentMethod,
                        items_table: sale.items.map(i => `${i.name} x${i.quantity} = KSh ${(i.price*i.quantity).toFixed(2)}`).join('<br>'),
                        total: sale.total.toFixed(2)
                    });
                    showToast('Receipt emailed!', 'success');
                } catch(e) { showToast('Email failed', 'error'); }
            }
        }

        // Stock
        function refreshStock() {
            const search = (document.getElementById('stockSearch')?.value || '').toLowerCase();
            let filtered = allProducts.filter(p => p.name.toLowerCase().includes(search));
            document.getElementById('stockList').innerHTML = filtered.map(p => `
                <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;">
                    <span>${p.name} (${p.quantity})</span>
                    <span><button onclick="adjustStock(${p.id},1)">+</button> <button onclick="adjustStock(${p.id},-1)">-</button></span>
                </div>`).join('');
        }
        async function adjustStock(pid, delta) {
            const prod = allProducts.find(p => p.id === pid);
            if (!prod) return;
            prod.quantity = Math.max(0, prod.quantity + delta);
            await idb.put('products', prod);
            await loadAllData(); refreshAll(); showToast('Stock updated');
        }

        // Expenses
        function openExpenseForm(id = null) {
            document.getElementById('expEditId').value = id || '';
            document.getElementById('expenseForm').reset();
            if (id) {
                const exp = allExpensesCache.find(e => e.id === id);
                document.getElementById('expCategory').value = exp.category;
                document.getElementById('expAmount').value = exp.amount;
                document.getElementById('expDesc').value = exp.description || '';
                document.getElementById('expDate').value = exp.date.split('T')[0];
            }
            document.getElementById('expenseModal').classList.add('active');
        }
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                category: document.getElementById('expCategory').value,
                amount: parseFloat(document.getElementById('expAmount').value),
                description: document.getElementById('expDesc').value.trim(),
                date: new Date(document.getElementById('expDate').value).toISOString()
            };
            const id = document.getElementById('expEditId').value;
            if (id) { data.id = parseInt(id); await idb.put('expenses', data); }
            else { await idb.add('expenses', data); }
            closeModal('expenseModal');
            await loadAllData(); refreshExpenseList(); showToast('Expense saved');
        });
        function refreshExpenseList() {
            const cat = document.getElementById('expenseFilterCategory').value;
            const dateVal = document.getElementById('expenseFilterDate').value;
            let filtered = allExpensesCache;
            if (cat) filtered = filtered.filter(e => e.category === cat);
            if (dateVal) {
                const filterDate = new Date(dateVal);
                filtered = filtered.filter(e => new Date(e.date).toDateString() === filterDate.toDateString());
            }
            const list = document.getElementById('expenseList');
            if (filtered.length === 0) { list.innerHTML = '<p>No expenses found.</p>'; return; }
            list.innerHTML = `<table class="table"><thead><tr><th>Date</th><th>Category</th><th>Amount</th><th>Description</th></tr></thead><tbody>
                ${filtered.map(exp => `<tr><td>${new Date(exp.date).toLocaleDateString()}</td><td>${exp.category}</td><td>KSh ${exp.amount.toFixed(2)}</td><td>${exp.description||''}</td></tr>`).join('')}
            </tbody></table>`;
        }

        // Dashboard (with Net Profit)
        function populateYearFilter() {
            const yearSelect = document.getElementById('filterYear');
            let years = allSalesCache.map(s => new Date(s.date).getFullYear()).filter(Boolean);
            years = [...new Set(years)].sort((a,b) => b-a);
            if (years.length === 0) years = [new Date().getFullYear()];
            yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
            yearSelect.value = currentFilter.year;
        }
        function applyDashboardFilter() {
            currentFilter.year = parseInt(document.getElementById('filterYear').value);
            currentFilter.month = document.getElementById('filterMonth').value;
            currentFilter.week = document.getElementById('filterWeek').value;
            refreshDashboard();
        }
        function getFilteredSales() {
            let sales = allSalesCache;
            if (currentFilter.year) sales = sales.filter(s => new Date(s.date).getFullYear() === currentFilter.year);
            if (currentFilter.month) sales = sales.filter(s => (new Date(s.date).getMonth() + 1) === parseInt(currentFilter.month));
            if (currentFilter.week) {
                sales = sales.filter(s => {
                    const d = new Date(s.date);
                    const startOfMonth = new Date(d.getFullYear(), d.getMonth(), 1);
                    const weekNum = Math.ceil((d.getDate() + startOfMonth.getDay()) / 7);
                    return weekNum === parseInt(currentFilter.week);
                });
            }
            return sales;
        }

        function refreshDashboard() {
            populateYearFilter();
            const sales = getFilteredSales();
            const count = sales.length;
            const revenue = sales.reduce((sum, s) => sum + s.total, 0);

            // Net Profit = sum of (selling price - cost price) * quantity
            let netProfit = 0;
            sales.forEach(s => {
                s.items.forEach(item => {
                    const profit = (item.price - (item.costPrice || 0)) * item.quantity;
                    netProfit += profit;
                });
            });

            // all-time mean daily sales
            const allDays = [...new Set(allSalesCache.map(s => new Date(s.date).toLocaleDateString()))];
            const totalAll = allSalesCache.reduce((sum, s) => sum + s.total, 0);
            const avgDaily = allDays.length ? (totalAll / allDays.length) : 0;

            document.getElementById('statTodaySales').textContent = count;
            document.getElementById('statRevenue').textContent = `KSh ${revenue.toFixed(0)}`;
            document.getElementById('statNetProfit').textContent = `KSh ${netProfit.toFixed(0)}`;
            document.getElementById('statAvgDaily').textContent = `KSh ${avgDaily.toFixed(0)}`;
            document.getElementById('statProducts').textContent = allProducts.length;
            document.getElementById('statLowStock').textContent = allProducts.filter(p => p.quantity <=5).length;

            // Daily line chart
            const dailyMap = {};
            sales.forEach(s => { const d = new Date(s.date).toLocaleDateString(); dailyMap[d] = (dailyMap[d] || 0) + s.total; });
            const labels = Object.keys(dailyMap).sort();
            const data = labels.map(l => dailyMap[l]);
            if (chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('salesChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ label: 'Revenue (KSh)', data, borderColor: '#e8789a', backgroundColor: 'rgba(232, 120, 154, 0.1)', fill: true, tension: 0.3 }] },
                options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
            });

            // Monthly Revenue vs Expenses bar chart
            const selectedYear = currentFilter.year;
            const monthRevenue = Array(12).fill(0);
            const monthExpenses = Array(12).fill(0);
            allSalesCache.forEach(s => {
                const d = new Date(s.date);
                if (d.getFullYear() === selectedYear) monthRevenue[d.getMonth()] += s.total;
            });
            allExpensesCache.forEach(exp => {
                const d = new Date(exp.date);
                if (d.getFullYear() === selectedYear) monthExpenses[d.getMonth()] += exp.amount;
            });
            const monthLabels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            if (monthlyChartInstance) monthlyChartInstance.destroy();
            const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
            monthlyChartInstance = new Chart(monthlyCtx, {
                type: 'bar',
                data: {
                    labels: monthLabels,
                    datasets: [
                        { label: 'Revenue', data: monthRevenue, backgroundColor: '#e8789a', borderRadius: 6 },
                        { label: 'Expenses', data: monthExpenses, backgroundColor: '#f0a04b', borderRadius: 6 }
                    ]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } }, plugins: { legend: { position: 'bottom' } } }
            });
        }

        // CSV exports
        function exportProductsCSV() {
            let csv = "Name,Code,Category,Condition,Size,Supplier,Buying Price,Selling Price,Stock\n";
            allProducts.forEach(p => csv += `"${p.name}","${p.productCode||''}","${p.category}","${p.condition}","${p.size}","${p.supplier||''}",${p.costPrice||0},${p.price},${p.quantity}\n`);
            downloadCSV(csv, 'products.csv');
        }
        function exportStockCSV() {
            let csv = "Name,Code,Category,Quantity\n";
            allProducts.forEach(p => csv += `"${p.name}","${p.productCode||''}","${p.category}",${p.quantity}\n`);
            downloadCSV(csv, 'stock.csv');
        }
        function exportExpensesCSV() {
            let csv = "Date,Category,Amount,Description\n";
            allExpensesCache.forEach(exp => csv += `${new Date(exp.date).toLocaleDateString()},"${exp.category}",${exp.amount},"${exp.description||''}"\n`);
            downloadCSV(csv, 'expenses.csv');
        }
        function exportSalesCSV() {
            const sales = getFilteredSales();
            let csv = "Date,Time,Receipt ID,Items,Total,Payment Method,Email\n";
            sales.forEach(s => {
                const d = new Date(s.date);
                const itemsStr = s.items.map(i => `${i.name} x${i.quantity}`).join('; ');
                csv += `${d.toLocaleDateString()},${d.toLocaleTimeString()},${s.id},"${itemsStr}",${s.total},${s.paymentMethod||''},${s.customerEmail||''}\n`;
            });
            downloadCSV(csv, 'sales.csv');
        }
        function downloadCSV(csv, filename) {
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
        }
        function refreshAll() {
            refreshPOS(); refreshProductList(); refreshStock(); refreshExpenseList(); refreshDashboard();
        }
        function showToast(msg, type='') {
            const container = document.getElementById('toastContainer');
            const div = document.createElement('div'); div.className = `toast ${type}`; div.textContent = msg;
            container.appendChild(div); setTimeout(() => div.remove(), 2000);
        }

        // Search listeners
        document.getElementById('productSearch')?.addEventListener('input', refreshProductList);
        document.getElementById('categoryFilter')?.addEventListener('change', refreshProductList);
        document.getElementById('posSearch')?.addEventListener('input', refreshPOS);
        document.getElementById('posCategoryFilter')?.addEventListener('change', refreshPOS);
        document.getElementById('stockSearch')?.addEventListener('input', refreshStock);
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
        }
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
